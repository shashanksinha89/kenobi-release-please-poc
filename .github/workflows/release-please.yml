name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
      version: ${{ steps.rp.outputs.version }}
      major: ${{ steps.rp.outputs.major }}
      minor: ${{ steps.rp.outputs.minor }}
      patch: ${{ steps.rp.outputs.patch }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: release-please-manifest.json

  build:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Demo build job
        run: |
          echo "Release ${{ needs.release-please.outputs.tag_name }} created"
          echo "Version: ${{ needs.release-please.outputs.version }}"
          echo "Bumped components: major=${{ needs.release-please.outputs.major }} minor=${{ needs.release-please.outputs.minor }} patch=${{ needs.release-please.outputs.patch }}"
          echo ""
          echo "In real kenobi-c2s, this is where:"
          echo "  - docker build + push to ACR (tagged with \${{ needs.release-please.outputs.tag_name }})"
          echo "  - helm package + push"
          echo "  - deploy promotion would run."
