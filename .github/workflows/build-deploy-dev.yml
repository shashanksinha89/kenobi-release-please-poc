name: build-deploy-dev

# Mirrors kenobi-c2s' azure-build-deploy-dev.yml: every push to main
# builds an sha-tagged image and rolls dev. Runs in parallel with
# release-please.yml on the same trigger — they don't depend on each
# other. Dev cluster always reflects main HEAD, regardless of whether
# release-please opens/updates a Release PR for that commit.
on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".vscode/**"
      - ".gitignore"

# Queue concurrent deploys rather than cancelling — cancelling
# mid-helm-upgrade can leave the release in a broken state. Same
# pattern as the real azure-build-deploy-dev.yml in kenobi-c2s.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy-dev:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: vars
        run: echo "sha7=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - name: Build sha-tagged image (stub)
        run: |
          echo "[stub] docker build -t cbcoreacrshared.azurecr.io/kenobi-c2s:sha-${{ steps.vars.outputs.sha7 }} ."
          echo "[stub] docker tag ... :main"
          echo "[stub] docker push ..."
      - name: Deploy to dev (stub)
        run: |
          echo "[stub] helm upgrade kenobi-c2s azure/helm-chart/kenobi-c2s/deployment-app/ \\"
          echo "          --namespace kenobi-c2s \\"
          echo "          --set image.tag=sha-${{ steps.vars.outputs.sha7 }} \\"
          echo "          -f azure/helm-chart/kenobi-c2s/deployment-app/values-dev.yaml"
          echo ""
          echo "Dev now running sha-${{ steps.vars.outputs.sha7 }} (commit ${GITHUB_SHA})"
